<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartWaste Management</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #059669; /* Green */
            --primary-color-glow: rgba(5, 150, 105, 0.5);
            --bg-dark: #0f172a;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(5, 150, 105, 0.15); /* Greenish glow */
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(15, 23, 42, 0.5); 
            bottom: -200px;
            right: -100px;
        }
        
        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(56, 189, 248, 0.1); /* Blueish secondary glow */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 40px); }
        }

        /* Login Container / Glassmorphism */
        .login-container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary-color), #34d399);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.75rem;
            margin: 0 auto 1.25rem;
            box-shadow: 0 0 20px var(--primary-color-glow);
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            width: 18px;
            height: 18px;
            pointer-events: none;
            transition: color 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-light);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2);
        }

        .form-control:focus + i, .form-control:not(:placeholder-shown) + i {
            color: var(--primary-color);
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .remember-me input {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #34d399;
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), #047857);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--primary-color);
        }

        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login.loading {
            color: transparent;
        }

        .btn-login.loading::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            transform: translate(-50%, -50%);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Error message styling */
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
            opacity: 0;
            height: 0;
            transition: all 0.3s ease;
        }
        
        .error-message.show {
            opacity: 1;
            height: auto;
            margin-top: 1rem;
        }

        @media screen and (max-width: 480px) {
            .login-container {
                width: calc(100% - 2rem);
                margin: 1rem auto;
                padding: 2rem 1.5rem;
            }
            .login-header h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <!-- Background Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">W</div>
            <h1>SmartWaste Admin</h1>
            <p>Enter your credentials to access the fleet dashboard</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username / Email</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="form-control" placeholder="admin@citywaste.gov" required autocomplete="username">
                    <i data-lucide="user"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    <i data-lucide="lock"></i>
                </div>
            </div>

            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Authenticate to Fleet</button>
            <div id="errorMsg" class="error-message">Invalid credentials. Try again.</div>
        </form>
    </div>

    <!-- Scripts -->
    <script>
        // Initialize icons
        lucide.createIcons();

        // Login Interaction
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Basic validation
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Reset error state
            errorMsg.classList.remove('show');

            // Set loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            // Simulate API call and login process
            setTimeout(() => {
                // Mock simple validation (accepts anything just for demo, or we can check specific creds)
                if (user.length > 2 && pass.length > 2) {
                    // Success - redirect to dashboard
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('username', user.split('@')[0]);
                    
                    window.location.href = 'index.html';
                } else {
                    // Fail state mock
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    errorMsg.classList.add('show');
                }
            }, 1500); // 1.5s simulated loading delay
        });

        // Add fun neon interaction on input field mousemove
        const formControls = document.querySelectorAll('.form-control');
        formControls.forEach(input => {
            input.parentElement.addEventListener('mousemove', (e) => {
                const rect = input.parentElement.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Add a very subtle hover highlight effect that follows cursor
                // For this simple version, we stick to CSS transitions, but logic is here for future canvas expand
            });
        });
    </script>
</body>
</html>
